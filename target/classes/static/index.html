<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowBooth - Pro Photo Booth</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>GlowBooth</h1>
            <p>Capture your moment with style</p>
        </header>

        <main class="booth-main">
            <section class="camera-section">
                <div class="camera-container" id="camera-container">
                    <video id="video" autoplay playsinline muted></video>
                    <div class="camera-error" id="camera-error">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <line x1="1" y1="1" x2="23" y2="23"></line>
                        </svg>
                        <p>Camera not detected or access denied</p>
                        <p id="error-detail" style="font-size: 0.8rem; color: #ffeb3b; margin: 10px 0;"></p>
                        <small>Please ensure you are using <b>localhost</b> and have granted permissions.</small>
                        <button onclick="location.reload()"
                            style="margin-top: 20px; padding: 8px 16px; border-radius: 20px; border: none; background: #fff; cursor: pointer;">Retry
                            Connection</button>
                    </div>
                    <div class="flash" id="flash"></div>
                    <div id="countdown"></div>
                </div>

                <div class="controls">
                    <button id="snap" class="btn btn-primary">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z">
                            </path>
                            <circle cx="12" cy="13" r="4"></circle>
                        </svg>
                        Single
                    </button>
                    <button id="multi-snap" class="btn btn-accent">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="3" y1="9" x2="21" y2="9"></line>
                            <line x1="3" y1="15" x2="21" y2="15"></line>
                            <line x1="9" y1="3" x2="9" y2="21"></line>
                        </svg>
                        Multi-Snap (4 Pics)
                    </button>
                    <button id="download" class="btn btn-secondary" disabled>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Download
                    </button>
                </div>
            </section>

            <aside class="settings-panel">
                <h2>Filters</h2>
                <div class="filter-list">
                    <div class="filter-item">
                        <input type="radio" name="filter" id="none" value="none" checked class="filter-input">
                        <label for="none" class="filter-label">None</label>
                    </div>
                    <div class="filter-item">
                        <input type="radio" name="filter" id="grayscale" value="grayscale(100%)" class="filter-input">
                        <label for="grayscale" class="filter-label">Black & White</label>
                    </div>
                    <div class="filter-item">
                        <input type="radio" name="filter" id="sepia" value="sepia(100%)" class="filter-input">
                        <label for="sepia" class="filter-label">Vintage Sepia</label>
                    </div>
                    <div class="filter-item">
                        <input type="radio" name="filter" id="invert" value="invert(100%)" class="filter-input">
                        <label for="invert" class="filter-label">Negative</label>
                    </div>
                    <div class="filter-item">
                        <input type="radio" name="filter" id="brightness" value="brightness(1.5)" class="filter-input">
                        <label for="brightness" class="filter-label">Brighten</label>
                    </div>
                    <div class="filter-item">
                        <input type="radio" name="filter" id="hue" value="hue-rotate(90deg)" class="filter-input">
                        <label for="hue" class="filter-label">Neon Hue</label>
                    </div>
                </div>

                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p id="progress-text">Snapshot 1 of 4</p>
                </div>
            </aside>
        </main>

        <canvas id="template-canvas" width="800" height="1200" style="display:none;"></canvas>

        <section class="gallery">
            <h2>Recent Shoots</h2>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Captured photos will appear here -->
            </div>
        </section>
    </div>

    <canvas id="canvas" width="640" height="480"></canvas>

    <script src="js/app.js"></script>
</body>

</html>
